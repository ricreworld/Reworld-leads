name: Overnight scan

on:
  schedule:
    - cron: "30 9 * * *"   # ~5:30am ET daily, before the first calls
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run scanner
        run: node scan.js
      - name: Commit leads.json
        run: |
          git config user.name "market-watch-scan"
          git config user.email "actions@github.com"
          git add leads.json
          git diff --cached --quiet || git commit -m "Overnight scan: refresh leads.json"
          git push
