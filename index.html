/* ---------------- utilities ---------------- */
const $=(s,el)=>(el||document).querySelector(s);
const $$=(s,el)=>[...(el||document).querySelectorAll(s)];
const esc=s=>String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const stamp=()=>new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",hour12:false});

function daysAgo(d){if(!d)return null;const t=Date.parse(d);if(!isFinite(t))return null;return Math.floor((Date.now()-t)/864e5)}

function haversine(a,b,c,d){if(!geoOK(a,b)||!geoOK(c,d))return null;const R=3958.8,r=x=>x*Math.PI/180,dlat=r(c-a),dlon=r(d-b),h=Math.sin(dlat/2)**2+Math.cos(r(a))*Math.cos(r(c))*Math.sin(dlon/2)**2;return Math.round(2*R*Math.asin(Math.sqrt(h)))}

/* ---------------- facilities (facts: CONTEXT_1.md) ---------------- */
const FAC={

function nearestOf(keys,it){

/* Routing decision — facility acceptance facts from CONTEXT_1.md */
function routeLead(terr,it){

/* ---------------- scoring (rules: CONTEXT_1.md) ---------------- */
function scoreLead(terr,it){
  const T=it.tags||{};let s=35;
  if(T.pfas)s+=30;
  if(T.controlled)s+=15;
  if(T.pharma)s+=12;
  if(T.recallHot)s+=15;
  if(T.aphis)s+=10;
  if(T.soil)s+=8;
  if(T.rcra)s+=8;
  if(T.zwtl)s+=10;
  if(T.invasive)s+=8;
  if(T.bid)s+=5;
  const d=daysAgo(it.date);
  if(d!=null){if(d<=7)s+=20;else if(d<=30)s+=10;else if(d>90)s-=25}
  if(it.qtyBig)s+=8;
  const r=routeLead(terr,it);
  if(r.mi!=null){if(r.mi<=15)s+=10;else if(r.mi<=30)s+=6;else if(r.mi<=60)s+=3}
  if(/pharma|cosmet|beauty|supplement|food|beverage|chem|health|hospital|lab/i.test((it.name||"")+" "+(it.desc||"")))s+=6;
  return Math.max(5,Math.min(98,Math.round(s)));
}
const tierOf=s=>s>=70?"hot":s>=45?"warm":"cool";

/* ---------------- recall classification ---------------- */
const DESTROY_SIGNALS=/contaminat|listeria|salmonella|e\.?\s?coli|foreign material|glass|metal|mold|adulterat|super.?potent|sub.?potent|impurit|undeclared|failed dissolution|microbial|yeast|penicillin|cgmp|sterility|nitrosamine/i;
const LABEL_ONLY=/^\s*(incorrect|wrong|missing)?\s*(label|labeling|carton|package insert)/i;

/* ---------------- board hygiene rules (carried from the overnight scanner) ---------------- */
// Raw sewage / wastewater: Reworld doesn't service it — never hits the board.
const SEWAGE=/raw sewage|sewage|sanitary waste|septic|wastewater treatment plant|\bwwtp\b|publicly owned treatment|\bpotw\b|biosolid|sludge from sewage|municipal wastewater/i;
// Retail / real-estate operators that can't be real volume (used on blank-status generators).
const SMALL_OPERATOR=/\bcleaners?\b|dry clean|laundr|\brealty\b|real estate|\bproperties\b|\bcollision\b|auto body|body shop|\bnail\b|\bsalon\b|\bdeli\b|\brestaurant\b|barber|\bspa\b/i;
// Invasive plant biomass must be hauled & destroyed (can't compost knotweed/phragmites).
const INVASIVE_RX=/japanese knotweed|knotweed|reynoutria|fallopia|polygonum cuspidatum|phragmites|common reed|water chestnut|trapa natans|mile-a-minute|persicaria perfoliata|tree-of-heaven|tree of heaven|ailanthus|purple loosestrife|lythrum|oriental bittersweet|asiatic bittersweet|celastrus|mugwort|multiflora rose|porcelain berry|japanese stiltgrass|stiltgrass|invasive species|invasive plant|invasive vegetation/i;
// Waste-stream classifier (streams.js taxonomy) — backfills signal tags on any lead.
function streamTags(txt){
  const t=(txt||"").toLowerCase();
  if(INVASIVE_RX.test(t))return{invasive:1,physical:1};
  if(/pfas|pfoa|pfos|afff|perfluor|firefighting foam/.test(t))return{pfas:1,liquid:1};
  if(/contaminated soil|\bsoil\b|demolition|asbestos|excavat|dredge|\bidw\b|remediation waste/.test(t))return{soil:1};
  if(/fuel oil|petroleum|oily|oil lagoon|diesel|gasoline|used oil/.test(t))return{liquid:1};
  if(/recall|expired|adulterat|undeclared|listeria|salmonella|consumer product|foreign material/.test(t))return{recall:1};
  if(/pharma|\bdrug\b|narcotic|controlled substance|\botc\b|tablet|capsule|secure destruction|cgmp/.test(t))return{pharma:1};
  if(/solvent|acid|caustic|chemical bulk|reagent|laborator|lab pack|corrosive|ignitable|reactive/.test(t))return{rcra:1};
  if(/rcra|hazardous.?waste|generator|violation/.test(t))return{rcra:1};
  return{};
}
function enrichTags(it){
  it.tags=it.tags||{};
  if(!Object.keys(it.tags).some(k=>it.tags[k]&&k!=="physical"&&k!=="registryOnly")){
    Object.assign(it.tags,streamTags((it.name||"")+" "+(it.cls||"")+" "+(it.desc||"")));
  }
  if(INVASIVE_RX.test((it.name||"")+" "+(it.desc||""))){it.tags.invasive=1;it.tags.physical=1}
  return it;
}
function qtyHeuristic(q){
  if(!q||!String(q).trim())return{unknown:true,big:false};
  const s=String(q).toLowerCase();
  const drums=(s.match(/(\d[\d,]*)\s*(?:55.?gal|drum)/)||[])[1];
  if(drums&&parseInt(drums.replace(/,/g,""))>=20)return{unknown:false,big:true};
  const n=(s.match(/([\d,]{4,})/)||[])[1];
  const big=!!n&&parseInt(n.replace(/,/g,""))>=2000;
  return{unknown:false,big};
}

async function jget(u){const r=await fetch(u);if(!r.ok)throw new Error("HTTP "+r.status);return r.json()}

function fdaSource(stateCode,cityRx){
  return{id:"fda",label:"FDA",fetch:async()=>{
    const items=[];let firstErr=null;
    for(const[ep,extra] of [["food",{food:1}],["drug",{pharma:1}],["device",{}]]){
      try{
        const u=`https://api.fda.gov/${ep}/enforcement.json?search=state:%22${stateCode}%22+AND+status:%22Ongoing%22&sort=report_date:desc&limit=80`;
        const j=await jget(u);const seen=new Set();
        (j.results||[]).forEach(x=>{
          const city=(x.city||"").toUpperCase();
          if(cityRx&&!cityRx.test(city))return;
          const reason=x.reason_for_recall||"";
          const hot=DESTROY_SIGNALS.test(reason)&&!LABEL_ONLY.test(reason);
          if(x.classification==="Class III")return;
          if(x.classification==="Class II"&&!hot)return;
          const q=qtyHeuristic(x.product_quantity);
          const rk=(x.recalling_firm||"")+"|"+(x.recall_initiation_date||"");
          if(seen.has(rk))return;seen.add(rk);
          const date=(x.report_date||x.recall_initiation_date||"").replace(/^(\d{4})(\d{2})(\d{2})$/,"$1-$2-$3");
          const tags=Object.assign({recall:1,recallHot:hot?1:0,physical:hot?1:0},extra);
          items.push({srcId:"fda-"+ep,source:"FDA Enforcement",name:x.recalling_firm||"Recalling firm",
            location:`${x.city||""}, ${x.state||""}`,date,
            desc:reason.slice(0,240)+(q.unknown?" — no quantity listed, call to confirm":(x.product_quantity?` — Qty: ${String(x.product_quantity).slice(0,70)}`:"")),
            url:x.recall_number?`https://api.fda.gov/${ep}/enforcement.json?search=recall_number:%22${encodeURIComponent(x.recall_number)}%22`:"https://www.accessdata.fda.gov/scripts/ires/index.cfm",
            cls:x.classification,qtyBig:q.big,volUnknown:q.unknown,tags});
        });
      }catch(e){firstErr=firstErr||e}
    }
    if(firstErr&&!items.length)throw firstErr;
    return items;
  }};
}

/* Generator feed, LQG-filtered. The ECHO violators feed (p_qiv) is intentionally
   NOT used — no size code, floods the board with dry cleaners / realty LLCs. */
async function echoFetch(st,countyRx){
  const j=await jget(`https://echodata.epa.gov/echo/rcra_rest_services.get_facilities?output=JSON&p_st=${st}&p_act=Y&responseset=1000`);
  let fac=(j.Results&&j.Results.Facilities)||[];
  const qid=j.Results&&j.Results.QueryID;
  if((!fac||!fac.length)&&qid){
    const jq=await jget(`https://echodata.epa.gov/echo/rcra_rest_services.get_qid?output=JSON&qid=${qid}&responseset=800&pageno=1`);
    fac=(jq.Results&&jq.Results.Facilities)||[];
  }
  const items=[],seen=new Set();let n=0;
  fac.forEach(f=>{
    const cty=f.RCRACounty||f.CountyName||"";
    if(countyRx&&!countyRx.test(cty))return;
    const name=f.RCRAName||f.FacName||"Facility";
    const uni=((f.RCRAUniverse||f.UniverseRecord||f.HreportUniverseRecord||f.RCRAGenStatus||f.GeneratorStatus||f.FedGeneratorStatus||f.RCRAFederalGeneratorStatus||f.FacFederalGeneratorStatus||"")+"").toUpperCase();
    const isLQG=/LQG|LARGE QUANTITY/.test(uni);
    const isSmall=/SQG|VSQG|CESQG|SMALL QUANTITY|VERY SMALL/.test(uni);
    if(isSmall)return;                            // confirmed small → drop
    if(!isLQG&&SMALL_OPERATOR.test(name))return;  // blank + retail/RE → drop
    const dk=(name+"|"+(f.RCRACity||f.FacCity||"")).toUpperCase();
    if(seen.has(dk)||n>=40)return;seen.add(dk);n++;
    items.push({srcId:"echo",source:"EPA RCRA",name,
      location:`${f.RCRACity||f.FacCity||""}, ${cty||st}`,
      lat:parseFloat(f.FacLat||f.RCRALat)||null,lon:parseFloat(f.FacLong||f.RCRALong)||null,
      desc:(isLQG?"LARGE QUANTITY GENERATOR — 1+ ton hazardous waste per month. ":"RCRA-registered hazardous waste generator. ")+"Routing/brokering prospect. Qualify streams, volume, current vendor, contract renewal.",
      url:(f.RegistryID||f.RegistryId)?`https://echo.epa.gov/detailed-facility-report?fid=${f.RegistryID||f.RegistryId}`:"https://echo.epa.gov/",
      tags:{rcra:1,registryOnly:1,lqg:isLQG?1:0}});
  });
  return items;
}

          const a=f.attributes||{},name=(a.NAME||a.Name||a.SITE_NAME||"MA 21E site").toString().trim();
          const town=a.TOWN||a.Town||a.MUNICIPALITY||"";
          const dk=(name+"|"+town).toUpperCase();if(seen.has(dk))return;seen.add(dk);
          const blob=JSON.stringify(a).toLowerCase(),pf=/pfas|pfoa|pfos|perfluor|afff/.test(blob);
          const g=f.geometry||{};
          items.push({srcId:"masites",source:"MassDEP 21E",name,
            location:(a.ADDRESS||a.Address||"")+", "+town+" (MA)",
            lat:g.y||null,lon:g.x||null,
            desc:(a.STATUS||a.Status||"MGL c.21E tier-classified site")+(pf?" — PFAS-flagged":""),
            url:"https://eeaonline.eea.state.ma.us/portal#!/search/wastesite",
            tags:{pfas:pf?1:0,soil:1,registryOnly:1}});
        });
        return items.slice(0,120);
      }catch(e){lastErr=e}
    }
    throw lastErr||new Error("both hosts failed");
  }},
  {id:"echo",label:"EPA ECHO",fetch:()=>echoFetch("MA",null)}
]
};

/* ---------------- scan engine ---------------- */
const LEADS={};           // terr -> items[]
const SCANSTATE={};       // terr -> {srcId:{status,when,...}}
const scanned=new Set();

async function runScan(terr,force){
  if(scanned.has(terr)&&!force)return;
  scanned.add(terr);
  const srcs=SOURCES[terr];
  SCANSTATE[terr]=SCANSTATE[terr]||{};
  LEADS[terr]=LEADS[terr]||[];
  renderScanBar(terr);
  const collected=[];
  await Promise.all(srcs.map(async s=>{
    SCANSTATE[terr][s.id]={status:"busy",when:stamp(),label:s.label};renderScanBar(terr);
    try{
      const items=await s.fetch();
      items.forEach(it=>{it.terr=terr;it.tags=it.tags||{}});
      collected.push(...items);
      SCANSTATE[terr][s.id]={status:"ok",when:stamp(),label:s.label,count:items.length};
    }catch(e){
      SCANSTATE[terr][s.id]={status:"fail",when:stamp(),label:s.label,err:(e&&e.message)||String(e)};
    }
    renderScanBar(terr);
  }));
  // board hygiene: sewage never hits the board; recency discipline: dated records
  // >90 days with no active signal drop off
  const fresh=collected.filter(it=>{
    if(SEWAGE.test((it.name||"")+" "+(it.desc||"")))return false;
    const d=daysAgo(it.date);
    if(d!=null&&d>90&&!it.tags.pfas&&!it.tags.registryOnly)return false;
    return true;
  });
  fresh.forEach(enrichTags);
  fresh.forEach(it=>{it.score=scoreLead(terr,it);it.tier=tierOf(it.score)});
  LEADS[terr]=fresh;
  DB.cache[terr]={when:new Date().toISOString(),items:fresh.slice(0,200)};saveDB();
  $("#hdrStamp").textContent="Last scan "+stamp();
  renderFeeds(terr);
}
function restoreCache(terr){
  const c=DB.cache[terr];
  if(c&&Array.isArray(c.items)&&c.items.length){
    LEADS[terr]=c.items;
    $("#hdrStamp").textContent="Cached "+new Date(c.when).toLocaleString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});
  }
}

/* ---------------- overnight scan (leads.json) ----------------
   Reaches the sources the browser can't (CORS): NYC DOB, FDNY, Title V, TRI,
   CBS, bankruptcies, CPSC, SEC EDGAR ZWTL, and the bid boards.
   Accepts BOTH schemas:
   - new: { territories: { ny|nnj|snj|ct|ma: { leads:[], bids:[] } } }
   - old: { ny:{short,long,comply,events}, nj:{...}, zwtl:[] }  (nj → nnj)   */
let OVERNIGHT=null;          // normalized: { terr: { leads:[], bids:[] } }
let OVERNIGHT_STAMP="";
function onKey(r){return "on|"+(r.source||"")+"|"+(r.name||"")+"|"+(r.date||"")}
function onToItem(terr,r){
  const it={srcId:"on-"+(r.source||"scan").toLowerCase().replace(/[^a-z0-9]+/g,""),
    source:r.source||"Overnight scan",name:r.name||"Lead",location:r.location||"",
    date:r.date||"",desc:r.desc||"",cls:r.cls||"",url:r.url||"",
    lat:r.lat!=null?r.lat:null,lon:r.lon!=null?r.lon:null,
    volUnknown:!!r.volUnknown,overnight:true,tags:{}};
  if(r.pfas)it.tags.pfas=1;
  if(r.zwtl||r.stream==="ZWTL Conversion")it.tags.zwtl=1;
  if(r.bid||r.stream==="Government Bid")it.tags.bid=1;
  if(r.invasive)it.tags.invasive=it.tags.physical=1;
  if(r.registry||/EPA RCRA|EPA TRI|Title V|NYSDEC CBS|NYSDEC$|NJDEP KCS|CT DEEP Sites|MassDEP/.test(r.source||""))it.tags.registryOnly=1;
  if(/EPA RCRA|EPA TRI|Title V/.test(r.source||""))it.tags.rcra=1;
  if(/FDA|FSIS|CPSC/.test(r.source||"")){it.tags.recall=1;if(r.hot){it.tags.recallHot=1}}
  if(/FDA drug/i.test(r.source||""))it.tags.pharma=1;
  if(r.hot&&!it.tags.registryOnly)it.tags.physical=1;
  enrichTags(it);
  it.score=scoreLead(terr,it);it.tier=tierOf(it.score);
  return it;
}
function normalizeOvernight(d){
  const norm={};["ny","nnj","snj","ct","ma"].forEach(t=>norm[t]={leads:[],bids:[]});
  if(d.territories){
    Object.keys(d.territories).forEach(t=>{
      if(!norm[t])return;
      (d.territories[t].leads||[]).forEach(r=>{if(!SEWAGE.test((r.name||"")+" "+(r.desc||"")))norm[t].leads.push(onToItem(t,r))});
      (d.territories[t].bids||[]).forEach(r=>norm[t].bids.push(onToItem(t,r)));
    });
  }else{
    // old two-territory schema: ny → ny, nj → nnj (old NJ tab covered the north counties)
    const map=[["ny","ny"],["nj","nnj"]];
    map.forEach(([from,to])=>{
      const src=d[from]||{};
      ["short","long","comply","events"].forEach(sec=>{
        (src[sec]||[]).forEach(r=>{
          if(SEWAGE.test((r.name||"")+" "+(r.desc||"")))return;
          if(r.stream==="Government Bid"){norm[to].bids.push(onToItem(to,r));return}
          norm[to].leads.push(onToItem(to,r));
        });
      });
    });
    (d.zwtl||[]).forEach(r=>{["ny","nnj"].forEach(t=>norm[t].leads.push(onToItem(t,{...r,zwtl:true})))});
  }
  return norm;
}
function overnightLeads(terr){return (OVERNIGHT&&OVERNIGHT[terr]&&OVERNIGHT[terr].leads)||[]}
/* merged view: live scan results + overnight, deduped (live wins) */
function allLeads(terr){
  const live=LEADS[terr]||[],seen=new Set(live.map(x=>((x.name||"")+"|"+(x.date||"")).toUpperCase()));
  const extra=overnightLeads(terr).filter(x=>{
    const k=((x.name||"")+"|"+(x.date||"")).toUpperCase();
    if(seen.has(k))return false;seen.add(k);return true;
  });
  return live.concat(extra);
}

/* ---------------- filters ---------------- */
const FILTER={q:"",signal:"",days:0,sort:"hot"};
const SIGNALS=[["","All"],["pfas","PFAS"],["pharma","Pharma"],["recall","Recall"],["rcra","Hazmat"],["aphis","APHIS"],["soil","Soil"],["invasive","Invasive"],["bid","Enviro bid"]];
function passFilter(it){
  if(FILTER.signal&&!it.tags[FILTER.signal])return false;
  if(FILTER.days){const d=daysAgo(it.date);if(d==null||d>FILTER.days)return false}
  if(FILTER.q){
    const q=FILTER.q.toLowerCase();
    if(!((it.name||"")+" "+(it.location||"")+" "+(it.desc||"")+" "+(it.source||"")).toLowerCase().includes(q))return false;
  }
  return true;
}
function sortItems(arr,terr){
  const a=[...arr];
  const pin=it=>leadState(leadKey(it)).pin?1:0;
  if(FILTER.sort==="new")a.sort((x,y)=>String(y.date||"0").localeCompare(String(x.date||"0")));
  else if(FILTER.sort==="near")a.sort((x,y)=>{
    const rx=routeLead(terr,x).mi,ry=routeLead(terr,y).mi;
    return (rx==null?9e9:rx)-(ry==null?9e9:ry);
  });
  else a.sort((x,y)=>(y.score||0)-(x.score||0));
  a.sort((x,y)=>pin(y)-pin(x));
  return a;
}

/* ---------------- rendering ---------------- */
function currentTerr(){const t=$(".tab.active");return t?t.dataset.terr:"ny"}

function actionLinks(it){
  const name=it.name||"",loc=(it.location||"").replace(/\(.*?\)/g,"").trim();
  const call=`https://www.google.com/search?q=${encodeURIComponent('"'+name+'" '+loc+' phone number')}`;
  const goog=`https://www.google.com/search?q=${encodeURIComponent('"'+name+'" '+loc)}`;
  const li=`https://www.linkedin.com/search/results/companies/?keywords=${encodeURIComponent(name)}`;
  const map=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name+" "+loc)}`;
  const subj=encodeURIComponent(`Reworld — disposal support for ${name}`);
  const body=encodeURIComponent("Hi,\n\nI'm reaching out from Reworld regarding "+(it.source?("the "+it.source+" record"):"a disposal need")+(it.date?(" dated "+it.date):"")+". We handle secure destruction, PFAS destruction (ReAssure), and landfill-banned waste streams with full chain of custody and a Certificate of Destruction on every secure load.\n\nWhere is that material sitting right now, and what volume are we talking about?\n\nThanks,");
  const mail=`mailto:?subject=${subj}&body=${body}`;
  return `<div class="actions">

    <a class="btn-act" href="${li}" target="_blank" rel="noopener">LinkedIn</a>
    <a class="btn-act" href="${map}" target="_blank" rel="noopener">Map it</a>
  </div>`;
}
function repStrip(k){
  const st=leadState(k);
  const chips=["new","called","qualified","held","dead"].map(s=>
    `<button class="st st-${s} ${st.st===s?"on":""}" data-key="${esc(k)}" data-st="${s}">${s}</button>`).join("");
  const pin=`<button class="st st-pin ${st.pin?"on":""}" data-key="${esc(k)}" data-pin="1" title="Pin to top">📌</button>`;
  let fupMsg="";
  if(st.fu){
    if(st.fu<todayISO())fupMsg=`<span class="fup-msg overdue">Overdue — this lead is cooling. Call or kill it.</span>`;
    else fupMsg=`<span class="fup-msg">Follow-up due ${fmtDate(st.fu)}</span>`;
  }
  return `<div class="repstrip">
    <div class="statusrow">${chips}${pin}
      <label class="fup">follow-up <input type="date" data-key="${esc(k)}" data-fu="1" value="${esc(st.fu||"")}"></label>
    </div>
    ${fupMsg?`<div style="margin-top:6px">${fupMsg}</div>`:""}
    <textarea class="notes" data-key="${esc(k)}" placeholder="${esc(NOTES_PH)}">${esc(st.notes||"")}</textarea>
  </div>`;
}
function leadCard(terr,it){
  it.tags=it.tags||{};
  const k=leadKey(it),st=leadState(k);
  const r=routeLead(terr,it);
  const d=daysAgo(it.date);
  const freshDot=(d!=null&&d<1)?' <span class="dot-live" title="fresh in last 24h"></span>':"";
  const tier=it.tier||"cool";
  const routing=r.fac
    ?`<div class="routing${r.warn?" nofit":""}"><div class="eyebrow">Routes to</div><div class="fac">${esc(r.fac.short)}${r.mi!=null?" — "+r.mi+" mi":""}</div><div class="fitnote">${esc(r.note)}</div></div>`
    :`<div class="routing nofit"><div class="eyebrow">No direct fit</div><div class="fitnote">${esc(r.note)}</div></div>`;
  return `<article class="card ${it.tags.physical?"hot-border":""} ${st.st==="dead"?"is-dead":""}" data-key="${esc(k)}">
    <div class="card-head">
      <span class="scorechip score-${tier}" title="${esc(SCORE_TIP)}">${tier} <span class="n">${it.score||""}</span></span>
      <span class="name">${st.pin?'<span class="pin-mark">📌</span>':""}${esc(it.name)}</span>${freshDot}
      <span class="when">${esc(fmtDate(it.date))}</span>
    </div>
    <div class="card-body">
      <p class="card-desc">${esc(it.desc||"")}</p>
      <p class="card-meta">${esc(it.location||"")}${it.location?" · ":""}${esc(it.source||"")}${it.date?" — reported "+esc(fmtDate(it.date)):""}${it.url?` — <a href="${esc(it.url)}" target="_blank" rel="noopener">view the government record ↗</a>`:""}</p>
    </div>
    ${routing}
    ${actionLinks(it)}
    ${repStrip(k)}
  </article>`;
}
function watchCard(terr,w,secKey){
  const k="wl|"+terr+"|"+secKey+"|"+w.name;
  const it={name:w.name,desc:w.note,tags:{}};
  return `<article class="card" data-key="${esc(k)}">
    <div class="card-head">
      <span class="tag">${esc(w.tag||"watch")}</span>
      <span class="name">${leadState(k).pin?'<span class="pin-mark">📌</span>':""}${esc(w.name)}</span>
    </div>
    <div class="card-body"><p class="card-desc">${esc(w.note)}</p></div>
    ${actionLinks(it)}
    ${repStrip(k)}
  </article>`;
}

function renderScanBar(terr){
  const el=$("#scanbar-"+terr);if(!el)return;
  const state=SCANSTATE[terr]||{};
  const srcs=SOURCES[terr];
  const parts=srcs.map(s=>{
    const st=state[s.id];
    if(!st)return `<span class="busy">${esc(s.label)} —</span>`;
    if(st.status==="busy")return `<span class="busy">${esc(s.label)} scanning…</span>`;
    if(st.status==="fail")return `<span class="src-fail">${esc(s.label)} scan failed — results may be incomplete. <a href="#" data-retry="${esc(terr)}">Retry.</a></span>`;
    return `<span>${esc(s.label)} ${esc(st.when)} <span class="ok">✓</span></span>`;
  });
  parts.push(OVERNIGHT_STAMP
    ?`<span>Overnight scan ${esc(OVERNIGHT_STAMP)} <span class="ok">✓</span></span>`
    :`<span class="busy">Environmental bids — overnight scan</span>`);
  el.innerHTML=`<span>Last scan:</span> ${parts.join(" · ")} <a href="#" class="refresh" data-refresh="${esc(terr)}">Refresh now</a>`;
}

function renderFeeds(terr){
  // a scan finishing mid-keystroke must never eat a rep's note
  const ae=document.activeElement;
  if(ae&&ae.classList&&ae.classList.contains("notes")&&ae.dataset.key)setLeadState(ae.dataset.key,{notes:ae.value});
  const T=TERR[terr];
  const items=allLeads(terr).filter(passFilter);
  const hotEl=$("#feed-"+terr+"-hottest");
  if(hotEl){
    const top=sortItems(items,terr).slice(0,12);
    hotEl.innerHTML=top.length?top.map(it=>leadCard(terr,it)).join(""):EMPTY_HTML;
  }
  T.sections.forEach(sec=>{
    if(sec.routing||sec.bids)return;
    const el=$("#feed-"+terr+"-"+sec.key);if(!el)return;
    let html="";
    if(sec.match){
      const sub=sortItems(items.filter(sec.match),terr).slice(0,20);
      html+=sub.map(it=>leadCard(terr,it)).join("");
      if(!sub.length&&(!sec.watch||!sec.watch.length))html+=`<div class="empty-quiet">Nothing matching in the last scan — watch stands.</div>`;
    }
    if(sec.watch&&sec.watch.length)html+=sec.watch.map(w=>watchCard(terr,w,sec.key)).join("");
    el.innerHTML=html;
  });
  renderBids(terr);
}
function renderBids(terr){
  const el=$("#feed-"+terr+"-bids");if(!el)return;
  const bids=(OVERNIGHT&&OVERNIGHT[terr]&&OVERNIGHT[terr].bids)||[];
  el.innerHTML=bids.length
    ?bids.map(b=>leadCard(terr,b)).join("")
    :`<div class="empty-quiet">No bids in the last overnight scan.</div>`;
}

function buildPanel(terr){

            <h3>${esc(f.name)}</h3>

function rebuildFilters(){
  const panel=$("#panel-"+currentTerr());if(!panel)return;
  $$("[data-f-signal]",panel).forEach(b=>b.classList.toggle("active",b.dataset.fSignal===FILTER.signal));
  $$("[data-f-days]",panel).forEach(b=>b.classList.toggle("active",+b.dataset.fDays===FILTER.days));
  $$("[data-f-sort]",panel).forEach(b=>b.classList.toggle("active",b.dataset.fSort===FILTER.sort));
}

/* ---------------- boot ---------------- */
document.addEventListener("DOMContentLoaded",()=>{
  $("#app").innerHTML=Object.keys(TERR).map(buildPanel).join("");
  Object.keys(TERR).forEach(t=>{restoreCache(t);renderScanBar(t);renderFeeds(t)});
  document.title=TERR.ny.metaTitle;
  runScan("ny");

  // overnight scan file (produced by scan.js via the GitHub Action)
  fetch("leads.json?t="+Date.now()).then(r=>r.ok?r.json():null).then(d=>{
    if(!d)return;
    OVERNIGHT=normalizeOvernight(d);
    if(d.generated)OVERNIGHT_STAMP=new Date(d.generated).toLocaleString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});
    Object.keys(TERR).forEach(t=>{renderScanBar(t);renderFeeds(t)});
  }).catch(()=>{});

  // theme toggle
  $("#themeBtn").addEventListener("click",()=>{
    const next=document.documentElement.dataset.theme==="dark"?"light":"dark";
    document.documentElement.dataset.theme=next;DB.theme=next;saveDB();
  });

  // tabs — with #hash deep links so each territory page is shareable
  const SLUGS={ny:"new-york",nnj:"north-jersey",snj:"south-jersey",ct:"connecticut",ma:"massachusetts"};
  function activateTab(terr,push){
    const b=$(`.tab[data-terr="${terr}"]`);if(!b)return;
    $$(".tab").forEach(x=>{x.classList.remove("active");x.setAttribute("aria-selected","false")});
    b.classList.add("active");b.setAttribute("aria-selected","true");
    $$(".panel").forEach(p=>p.classList.remove("active"));
    $("#panel-"+terr).classList.add("active");
    document.title=TERR[terr].metaTitle;
    const md=$('meta[name="description"]');if(md&&TERR[terr].metaDesc)md.setAttribute("content",TERR[terr].metaDesc);
    if(push)history.replaceState(null,"","#"+SLUGS[terr]);
    rebuildFilters();
    renderFeeds(terr);   // show cached + overnight immediately; the scan re-renders when done
    window.scrollTo({top:0});
    runScan(terr);
  }
  $$(".tab").forEach(b=>b.addEventListener("click",()=>activateTab(b.dataset.terr,true)));
  const startSlug=(location.hash||"").replace("#","");
  const startTerr=Object.keys(SLUGS).find(t=>SLUGS[t]===startSlug);
  if(startTerr&&startTerr!=="ny")activateTab(startTerr,false);
  window.addEventListener("hashchange",()=>{
    const t=Object.keys(SLUGS).find(t=>SLUGS[t]===(location.hash||"").replace("#",""));
    if(t&&!$(`.tab[data-terr="${t}"]`).classList.contains("active"))activateTab(t,false);
  });

  // delegated clicks: refresh / retry / filters / status / pin
  document.addEventListener("click",ev=>{
    const t=ev.target,terr=currentTerr();
    if(t.closest("[data-refresh]")||t.closest("[data-retry]")){ev.preventDefault();runScan(terr,true);return}
    const fs=t.closest("[data-f-signal]");if(fs){FILTER.signal=fs.dataset.fSignal;rebuildFilters();renderFeeds(terr);return}
    const fd=t.closest("[data-f-days]");if(fd){FILTER.days=+fd.dataset.fDays;rebuildFilters();renderFeeds(terr);return}
    const fo=t.closest("[data-f-sort]");if(fo){FILTER.sort=fo.dataset.fSort;rebuildFilters();renderFeeds(terr);return}
    const st=t.closest("[data-st]");if(st){
      const k=st.dataset.key,cur=leadState(k);
      setLeadState(k,{st:cur.st===st.dataset.st?"":st.dataset.st});
      renderFeeds(terr);return;
    }
    const pin=t.closest("[data-pin]");if(pin){
      const k=pin.dataset.key;setLeadState(k,{pin:!leadState(k).pin});renderFeeds(terr);return;
    }
  });
  document.addEventListener("input",ev=>{
    const t=ev.target;
    if(t.matches("[data-f-q]")){FILTER.q=t.value;clearTimeout(t._tt);t._tt=setTimeout(()=>renderFeeds(currentTerr()),200);return}
    if(t.matches(".notes")){clearTimeout(t._nt);t._nt=setTimeout(()=>setLeadState(t.dataset.key,{notes:t.value}),400)}
  });
  document.addEventListener("change",ev=>{
    const t=ev.target;
    if(t.matches("[data-fu]")){setLeadState(t.dataset.key,{fu:t.value});renderFeeds(currentTerr());return}
    if(t.matches(".notes")){setLeadState(t.dataset.key,{notes:t.value})}
  });
  document.addEventListener("focusout",ev=>{
    const t=ev.target;
    if(t.matches&&t.matches(".notes"))setLeadState(t.dataset.key,{notes:t.value});
  });
});
</script>
</body>
</html>
